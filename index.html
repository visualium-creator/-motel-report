<title>랜드+스마트 일일보고서</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;--bg2:#F7F7F5;--bg3:#EFEEEC;
  --border:#E5E4E1;--border2:#D1CFC9;
  --text:#1A1A18;--text2:#4B4A47;--text3:#7C7B77;
  --green:#0F6E56;--green-bg:#EAF3DE;--green-border:#9FE1CB;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --red:#A32D2D;
  --orange:#854F0B;--orange-bg:#FAEEDA;
}
body,html{background:#F3F2EF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;color:var(--text)}
input,select,textarea,button{font-family:inherit}
.wrap{padding:.6rem .75rem;margin:0 auto;background:#F3F2EF;max-width:1400px}
.page-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:.6rem}
.header{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;background:var(--bg);padding:9px 12px;border-radius:9px;border:1px solid var(--border)}
.header-label{font-size:12px;font-weight:500;color:var(--text3)}
.ctrl{font-size:13px;padding:5px 8px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--text)}
.locked-banner{display:none;align-items:center;gap:8px;padding:8px 12px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:7px;margin-bottom:.6rem;font-size:12px;color:var(--green);font-weight:500}
.locked-banner.show{display:flex}
.tabs{display:flex;margin-bottom:.6rem;border:1px solid var(--border2);border-radius:7px;overflow:hidden;width:fit-content;background:var(--bg2)}
.tab-btn{padding:6px 20px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text3);border:none}
.tab-btn:not(:last-child){border-right:1px solid var(--border)}
.tab-btn.land-active{background:var(--bg);color:var(--green);border-bottom:2px solid var(--green)}
.tab-btn.smart-active{background:var(--bg);color:var(--blue);border-bottom:2px solid var(--blue)}
.staff-row{display:flex;align-items:center;gap:12px;margin-bottom:.6rem;background:var(--bg);padding:7px 12px;border-radius:7px;border:1px solid var(--border)}
.staff-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3)}
.staff-item input{width:88px;font-size:12px;padding:4px 7px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text)}
.staff-item input:disabled{opacity:.5;cursor:not-allowed;background:var(--bg2)}
.floor-label{font-size:10px;font-weight:600;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.floor-section{margin-bottom:8px;width:100%}
.rooms-grid-wide{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;width:100%}
.rooms-grid-land{display:grid;grid-template-columns:repeat(11,1fr);gap:5px;width:100%}
.rooms-grid-smart{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;width:100%}
.room-card-wide{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;overflow:hidden;min-height:110px;transition:border-color .15s,box-shadow .15s}
.room-card-wide:hover{border-color:var(--border2);box-shadow:0 1px 4px rgba(0,0,0,.07)}
.room-card-wide.has-sale{border-color:#1D9E75}
.room-card-wide.all-cancelled{border-color:var(--red);opacity:.7}
.room-card-wide.nosmoking{border-left:3px solid var(--blue)}
.room-card-wide.reserved{border-color:#F59E0B}
.room-header{display:flex;justify-content:space-between;align-items:center;padding:5px 7px 4px;border-bottom:1px solid var(--border);background:var(--bg2)}
.room-num{font-size:13px;font-weight:600;color:var(--text2)}
.room-badges{display:flex;gap:2px;align-items:center;flex-wrap:wrap}
.room-type-badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600}
.type-트윈{background:#DBEAFE;color:#1D4ED8}
.type-더블{background:#DCFCE7;color:#166534}
.type-킹{background:#FEF3C7;color:#92400E}
.type-킹더블{background:#EDE9FE;color:#5B21B6}
.type-스위트{background:#FCE7F3;color:#9D174D}
.type-온돌{background:#FFEDD5;color:#9A3412}
.type-PH{background:#FEE2E2;color:#991B1B}
.type-S{background:#F1F5F9;color:#475569}
.nosmoking-badge{font-size:8px;padding:1px 5px;border-radius:3px;background:#DBEAFE;color:#1D4ED8;font-weight:600}
.sale-slot{padding:4px 7px;border-bottom:1px solid var(--border)}
.sale-slot:last-child{border-bottom:none}
.sale-slot.cancelled{opacity:.5;text-decoration:line-through;background:#FEF2F2}
.sale-price{font-size:15px;font-weight:600;color:var(--text)}
.sale-guest{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pay-chips{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.chip{font-size:10px;padding:2px 5px;border-radius:3px;font-weight:600}
.chip-현금{background:#F7F7F5;color:#1A1A18}
.chip-카드{background:#FFF0F0;color:#CC0000}
.chip-NOL{background:#E6F0FF;color:#0066CC}
.chip-여기어때{background:#FFF0F3;color:#FF2B4A}
.chip-통장{background:#F3EEFF;color:#5B21B6}
.chip-미수금{background:#FCEBEB;color:#A32D2D}
.chip-기타{background:#F7F7F5;color:#4B4A47}
.chip-장기방{background:#F0FDF4;color:#166534}
.chip-직원숙소{background:#F1F5F9;color:#475569}
.chip-서비스{background:#F0FFF4;color:#166534}
.chip-네이버{background:#E8F5E9;color:#1B5E20}
.chip-취소{background:#FEE2E2;color:#991B1B}
.chip-재숙{background:#EDE9FE;color:#5B21B6}
.chip-도도포인트{background:#F0F4FF;color:#4B7BEC}
.chip-예약{background:#FEF3C7;color:#92400E}
.chip-사전결제{background:#FEF9C3;color:#854F0B}
.empty-room{height:58px}
.section-title{font-size:11px;font-weight:700;color:var(--text3);margin:1rem 0 5px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);padding-bottom:3px;text-align:center}
.exp-wrap{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.exp-row{display:grid;grid-template-columns:2fr 1.2fr 1fr auto;gap:6px;align-items:center;margin-bottom:5px}
.exp-row input,.exp-row select{font-size:12px;padding:5px 7px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text);width:100%}
.nc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.nc-panel{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.nc-panel-head{font-size:12px;font-weight:600;padding:7px 11px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.nc-panel-head.note-head{background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE}
.nc-panel-head.claim-head{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.nc-input-area{padding:8px 10px;border-bottom:1px solid var(--border);background:var(--bg2)}
.nc-input-area.locked{opacity:.45;pointer-events:none;user-select:none}
.nc-input-row1{display:flex;gap:6px;margin-bottom:5px}
.nc-input-row2{display:flex;gap:6px}
.nc-input-area select,.nc-input-area input{font-size:12px;padding:5px 7px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text)}
.nc-room-sel{flex:1}.nc-text-input{flex:1}
.nc-add-btn{font-size:12px;padding:7px 16px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;white-space:nowrap}
.nc-items{padding:6px 10px;min-height:48px}
.nc-item{display:flex;gap:8px;align-items:flex-start;padding:5px 4px;border-bottom:1px solid var(--border);font-size:12px}
.nc-item:last-child{border-bottom:none}
.nc-room-badge{font-size:12px;font-weight:600;padding:3px 9px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.nc-room-badge.note-badge{background:#DBEAFE;color:#1D4ED8}
.nc-room-badge.claim-badge{background:#FEE2E2;color:#991B1B}
.nc-room-badge.direct-badge{background:#F1F5F9;color:#475569}
.nc-text{flex:1;color:var(--text);line-height:1.5}
.nc-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0 2px}
.empty-nc{font-size:11px;color:var(--text3);padding:10px 4px;text-align:center}
.final-summary{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:.5rem;width:380px;margin-left:auto;margin-right:auto}
.fs-row{display:flex;justify-content:center;gap:48px;align-items:center;padding:7px 14px;border-bottom:1px solid var(--border);font-size:13px}
.fs-row:last-child{border-bottom:none}
.fs-row.fs-total{background:var(--bg2);font-weight:600}
.fs-row.fs-expense{background:#FEF2F2}
.fs-row.fs-balance{background:var(--green-bg);font-weight:600}
.fs-label{color:var(--text3);font-size:12px;width:120px;text-align:right;flex-shrink:0}
.fs-val{font-weight:600;color:var(--text);font-size:13px;width:130px;text-align:left;flex-shrink:0}
.fs-val.현금{color:#1A1A18}.fs-val.카드{color:#CC0000}.fs-val.NOL{color:#0066CC}.fs-val.여기어때{color:#FF2B4A}
.fs-val.통장{color:#5B21B6}.fs-val.미수금{color:#A32D2D}
.fs-val.장기방{color:#166534}.fs-val.직원숙소{color:#475569}.fs-val.기타{color:#4B4A47}
.fs-val.서비스{color:#166534}.fs-val.네이버{color:#1B5E20}
.fs-val.green{color:var(--green)}.fs-val.red{color:var(--red)}.fs-val.blue{color:var(--blue)}
.submit-area{margin-top:1.25rem;padding:1.1rem 1.25rem;background:var(--bg);border:1px solid var(--border);border-radius:9px;width:380px;margin-left:auto;margin-right:auto}
.submit-area-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.submit-title{font-size:13px;font-weight:600;color:var(--text)}
.submit-status{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.status-pending{background:var(--orange-bg);color:var(--orange)}
.status-sent{background:var(--green-bg);color:var(--green)}
.submit-info{font-size:12px;color:var(--text3);margin-bottom:.75rem;line-height:1.6}
.btn-submit{width:100%;padding:10px;font-size:14px;font-weight:600;border-radius:8px;border:none;cursor:pointer;background:#1D9E75;color:#fff}
.btn-submit:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed}
.btn-submit.sent{background:var(--blue)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg);border-radius:12px;border:1px solid var(--border);padding:1.4rem;width:400px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem}
.modal-head h2{font-size:15px;font-weight:600;color:var(--text)}
.close-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);padding:2px 6px;border-radius:5px}
.sale-card{border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.sale-card.cancelled-card{border-color:var(--red)}
.sale-card.reserved-card{border-color:#F59E0B}
.sale-card-head{display:flex;justify-content:space-between;align-items:center;padding:6px 11px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2)}
.sale-card-head.cancelled-head{background:#FEF2F2;color:var(--red)}
.sale-card-head.saved-head{background:#F0FDF4;color:#166534}
.sale-card-head.reserved-head{background:#FFFBEB;color:#92400E}
.sale-card-body{padding:9px 11px}
.saved-view{font-size:12px}
.saved-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);color:var(--text3)}
.saved-row:last-child{border-bottom:none}
.saved-row span:last-child{color:var(--text);font-weight:500}
.saved-actions{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.fg{margin-bottom:9px}
.fg label{font-size:11px;color:var(--text3);display:block;margin-bottom:3px;font-weight:500}
.fg label .req{color:var(--red);margin-left:2px}
.fg input,.fg select,.fg textarea{width:100%;font-size:13px;padding:5px 9px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--text)}
.fg-row{display:flex;gap:9px}.fg-row .fg{flex:1}
.pay-rows{margin-bottom:7px}
.pay-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.pay-row select{flex:1.3;font-size:12px;padding:5px 7px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text)}
.pay-row input[type=text]{flex:1;font-size:13px;padding:5px 7px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text)}
.del-pay{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:0 2px;flex-shrink:0}
.add-pay-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:1px dashed var(--border2);background:var(--bg2);color:var(--text3);cursor:pointer;margin-bottom:7px}
.cb-row{display:flex;gap:14px;margin-bottom:9px;align-items:center;flex-wrap:wrap}
.cb-row label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer}
.modal-btns{display:flex;gap:7px;margin-top:.9rem}
.btn{flex:1;padding:7px;font-size:13px;border-radius:7px;border:1px solid var(--border2);cursor:pointer;background:var(--bg);color:var(--text);font-weight:500}
.btn-save{background:#1D9E75;border-color:#1D9E75;color:#fff}
.btn-cancel-sale{background:#FEF2F2;border-color:#FECACA;color:var(--red)}
.btn-checkout{background:#EFF6FF;border-color:#BFDBFE;color:var(--blue)}
.btn-edit{background:#EFF6FF;border-color:#BFDBFE;color:var(--blue)}
.btn-add-sale{background:var(--bg2);border-color:var(--border2);color:var(--text2)}
.btn-delete-reservation{background:#FFFBEB;border-color:#FDE68A;color:#92400E}
.cancelled-badge{font-size:10px;background:#FEE2E2;color:var(--red);padding:2px 7px;border-radius:4px;font-weight:600}
.cancel-confirm{background:var(--bg);border-radius:11px;border:1.5px solid #FECACA;padding:1.4rem;width:330px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.cancel-confirm h2{font-size:14px;font-weight:600;color:var(--red);margin-bottom:.7rem}
.hist-item{border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:7px;font-size:12px}
.hist-item.hist-cancelled{border-color:#FECACA;background:#FEF2F2}
.hist-row{display:flex;justify-content:space-between;color:var(--text3);margin-bottom:2px}
.hist-price{font-size:14px;font-weight:600;color:var(--red);text-decoration:line-through}
.pw-overlay{display:flex;position:fixed;inset:0;background:#F3F2EF;z-index:9999;align-items:center;justify-content:center}
.pw-box{background:#fff;border:1px solid #E5E4E1;border-radius:12px;padding:2rem;width:320px;text-align:center}
.pw-title{font-size:18px;font-weight:700;color:#1A1A18;margin-bottom:.4rem}
.pw-sub{font-size:13px;color:#7C7B77;margin-bottom:1.2rem}
.pw-input{width:100%;font-size:15px;padding:9px 12px;border-radius:8px;border:1.5px solid #D1CFC9;text-align:center;letter-spacing:3px;margin-bottom:.8rem;outline:none;font-family:inherit}
.pw-input:focus{border-color:#0F6E56}
.pw-btn{width:100%;padding:10px;font-size:14px;font-weight:600;border-radius:8px;border:none;background:#0F6E56;color:#fff;cursor:pointer}
.pw-error{font-size:12px;color:#A32D2D;margin-top:.5rem;display:none}
.exp-item{display:flex;flex:1;font-size:12px}
.exp-item-name{color:var(--text);font-weight:500}
.exp-item-amt{color:var(--text);font-weight:600}
.sale-car{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;margin-top:4px;line-height:1}
.notif-bell{position:fixed;top:12px;right:12px;z-index:500;background:var(--bg);border:1px solid var(--border2);border-radius:50%;width:76px;height:76px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:36px}
.notif-badge{position:absolute;top:2px;right:2px;background:#EF4444;color:#fff;font-size:9px;font-weight:700;border-radius:50%;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.notif-panel{position:fixed;top:100px;right:12px;z-index:499;width:280px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.13);display:none;max-height:60vh;overflow-y:auto}
.notif-panel.show{display:block}
.notif-head{font-size:12px;font-weight:600;padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
.notif-item{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px}
.notif-item:last-child{border-bottom:none}
.notif-text{flex:1;color:var(--text);line-height:1.5}
.notif-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 2px;flex-shrink:0;margin-left:6px}
.notif-empty{font-size:11px;color:var(--text3);padding:12px;text-align:center}
.toast-container{position:fixed;top:12px;right:96px;z-index:501;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg);border:1px solid var(--border2);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.13);padding:12px 17px;min-width:288px;max-width:336px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;pointer-events:all;animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast-text{font-size:14px;color:var(--text);line-height:1.5;flex:1}
.toast-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0;flex-shrink:0}
.ms-item{border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;cursor:pointer;transition:border-color .15s}
.ms-item:hover{border-color:var(--border2)}
.ms-item.ms-active{border-color:#1D9E75}
.ms-item.ms-earlyout{border-color:var(--orange);opacity:.7}
.ms-head{display:flex;justify-content:space-between;align-items:center}
.ms-id{font-weight:600;color:var(--text);font-size:13px}
.ms-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.ms-tag.active{background:var(--green-bg);color:var(--green)}
.ms-tag.earlyout{background:var(--orange-bg);color:var(--orange)}
.ms-detail{margin-top:8px;display:none}
.ms-detail.show{display:block}
.ms-days{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.ms-day{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);padding:2px 0;border-bottom:1px dashed var(--border)}
.ms-day:last-child{border-bottom:none}
.ms-day span:last-child{color:var(--text);font-weight:500}
.ms-actions{display:flex;gap:6px;margin-top:8px}
</style>

<div class="pw-overlay" id="pw-overlay">
  <div class="pw-box">
    <div class="pw-title">🏨 랜드+스마트 보고서</div>
    <div class="pw-sub">비밀번호를 입력하세요</div>
    <input class="pw-input" type="password" id="pw-input" placeholder="●●●●" maxlength="20" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">확인</button>
    <div class="pw-error" id="pw-error">비밀번호가 틀렸습니다</div>
  </div>
</div>

<div class="notif-bell" id="notif-bell" onclick="toggleNotifPanel()">
  🔔<span class="notif-badge" id="notif-badge" style="display:none"></span>
</div>
<div class="notif-panel" id="notif-panel">
  <div class="notif-head">연박 알림 (전체)</div>
  <div id="notif-list"></div>
</div>

};
let currentHotel='랜드호텔';
let FLOORS=FLOORS_MAP[currentHotel];
let PAYS=PAYS_MAP[currentHotel];

let currentRoom=null,modalMode='edit',editSales=[],pendingCancel={};
let LOCKED=false;
let toastQueue=[];

// ── DB ──
function loadDb(){try{return JSON.parse(localStorage.getItem('lsDb')||'{}');}catch(e){return {};}}
function saveDb(db){try{localStorage.setItem('lsDb',JSON.stringify(db));}catch(e){}}
function loadMs(){try{return JSON.parse(localStorage.getItem('lsMs')||'[]');}catch(e){return [];}}
function saveMs(arr){try{localStorage.setItem('lsMs',JSON.stringify(arr));}catch(e){}}
function loadDismissed(){try{return JSON.parse(localStorage.getItem('lsDismissed')||'{}');}catch(e){return {};}}
function saveDismissed(d){try{localStorage.setItem('lsDismissed',JSON.stringify(d));}catch(e){}}

const todayStr=new Date().toISOString().slice(0,10);
document.getElementById('date-sel').value=todayStr;
function getDate(){return document.getElementById('date-sel').value;}
function getKey(){return getDate()+'__'+currentHotel;}
function ensureData(){const db=loadDb();const k=getKey();if(!db[k])db[k]={rooms:{},expenses:[],notes:[],claims:[],staff:{am:'',day:'',night:''},submitted:false,submittedAt:''};saveDb(db);return db[k];}
function getData(){const db=loadDb();const k=getKey();if(!db[k])return ensureData();return db[k];}

// ── 유틸 ──
function fmt(n){return Number(n||0).toLocaleString();}
function nowStr(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
function addDateDays(dateStr,n){const d=new Date(dateStr);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/(1000*60*60*24))+1;}
function getRoomInfo(r){return buildRooms()[r]||{type:'',nosmoking:false,floor:''};}
function getAllRooms(){return FLOORS.flatMap(f=>f.rooms);}
function isReservation(s){return s.pays.length===1&&s.pays[0].type==='예약'&&!s.cancelled;}
function hasSale(s){if(s.cancelled||isReservation(s))return false;const isStaff=s.pays.some(p=>p.type==='직원숙소');if(isStaff)return false;return s.pays.some(p=>p.type==='장기방')||s.pays.some(p=>p.type==='서비스')||s.pays.some(p=>Number(p.amt||0)>0);}
function newSale(){return{pays:[{type:'',amt:''}],guest:'',car:'',phone:'',checkin:'',restay:false,multiStay:false,multiStayNights:2,checkoutDate:'',msId:null,janggiLocked:false,checkedOut:false,cancelled:false,cancelReason:'',cancelledAt:'',savedAt:''};}

// ── 연박/장기방 인스턴스 ──
function getDismissedToday(){return loadDismissed()[getDate()]||[];}

function getTodayNotifs(){
  const today=getDate();
  return loadMs().filter(ms=>{
    if(ms.earlyOut)return false;
    if(ms.hotel&&ms.hotel!==currentHotel)return false;
    return today>ms.checkinDate&&today<addDateDays(ms.checkinDate,ms.nights);
  });
}

function renderNotifBadge(){
  const notifs=getTodayNotifs();
  const dismissed=getDismissedToday();
  const unread=notifs.filter(ms=>!dismissed.includes(ms.id));
  const badge=document.getElementById('notif-badge');
  if(!badge)return;
  if(unread.length>0){badge.style.display='flex';badge.textContent=unread.length;}
  else badge.style.display='none';
}

function dismissNotif(id){
  const dismissed=loadDismissed();
  const k=getDate();if(!dismissed[k])dismissed[k]=[];
  if(!dismissed[k].includes(id))dismissed[k].push(id);
  saveDismissed(dismissed);
  const toast=document.getElementById('toast-'+id.replace(/[^a-zA-Z0-9]/g,''));
  if(toast)toast.remove();
  renderNotifBadge();
}

function renderNotifPanel(){
  const notifs=getTodayNotifs();
  const dismissed=getDismissedToday();
  const list=document.getElementById('notif-list');
  if(!notifs.length){list.innerHTML='<div class="notif-empty">알림이 없습니다</div>';renderNotifBadge();return;}
  list.innerHTML=notifs.map(ms=>{
    const notifText=daysBetween(ms.checkinDate,getDate())+'일차 입력 필요';
    const isDismissed=dismissed.includes(ms.id);
    return '<div class="notif-item" style="'+(isDismissed?'opacity:.5':'')+'"><span class="notif-text"><b>'+ms.id+'</b><br>'+notifText+(isDismissed?' <span style="font-size:10px;color:var(--text3)">(확인됨)</span>':'')+'</span></div>';
  }).join('');
  renderNotifBadge();
}

function showToasts(){
  const container=document.getElementById('toast-container');
  if(container)container.innerHTML='';
  const notifs=getTodayNotifs();
  const dismissed=getDismissedToday();
  const pending=notifs.filter(ms=>!dismissed.includes(ms.id));
  renderNotifBadge();
  if(!pending.length)return;
  toastQueue=[...pending];
  showNextToast();
}

function showNextToast(){
  if(!toastQueue.length)return;
  const ms=toastQueue.shift();
  const container=document.getElementById('toast-container');
  if(!container)return;
  const notifText=ms.type==='장기'?'오늘 퇴실 예정입니다':(daysBetween(ms.checkinDate,getDate())+'일차 입력 필요');
  const safeId='toast-'+ms.id.replace(/[^a-zA-Z0-9]/g,'');
  if(document.getElementById(safeId)){setTimeout(showNextToast,1200);return;}
  const toast=document.createElement('div');
  toast.className='toast';toast.id=safeId;
  toast.innerHTML='<span class="toast-text"><b>'+ms.id+'</b><br>'+notifText+'</span><button class="toast-close" onclick="dismissNotif(\''+ms.id+'\')">✕</button>';
  container.appendChild(toast);
  setTimeout(showNextToast,1200);
}

function toggleNotifPanel(){
  const p=document.getElementById('notif-panel');
  p.classList.toggle('show');
  if(p.classList.contains('show'))renderNotifPanel();
}
document.addEventListener('click',function(e){
  const bell=document.getElementById('notif-bell');
  const panel=document.getElementById('notif-panel');
  if(bell&&panel&&!bell.contains(e.target)&&!panel.contains(e.target))panel.classList.remove('show');
});

function showMultiStay(){
  const arr=loadMs();
  const el=document.getElementById('ms-content');
  if(!arr.length){el.innerHTML='<p style="font-size:13px;color:#6B7280;text-align:center;padding:1.5rem">등록된 연박 내역이 없습니다</p>';document.getElementById('ms-modal').classList.add('show');return;}
  el.innerHTML=arr.map((ms,i)=>{
    const tag=ms.earlyOut?'<span class="ms-tag earlyout">조기퇴실</span>':'<span class="ms-tag active">연박 진행중</span>';
    let days='';
    {
      Array.from({length:ms.nights},(_,di)=>{
        const date=addDateDays(ms.checkinDate,di);
        const dayLabel=di===0?'1일차 (체크인)':di===ms.nights-1?ms.nights+'일차 (퇴실예정)':(di+1)+'일차';
        const db=loadDb();const key=date+'__'+currentHotel;const dayData=db[key];
        let linked=null;
        if(dayData&&dayData.rooms){for(const rid of Object.keys(dayData.rooms)){const found=dayData.rooms[rid].find(s=>s.msId===ms.id&&!s.cancelled);if(found){linked=found;break;}}}
        const status=linked?'<span style="color:var(--green);font-weight:600">입력완료</span>':'<span style="color:#9CA3AF">미입력</span>';
        days+='<div class="ms-day"><span>'+date+' '+dayLabel+'</span>'+status+'</div>';
      });
    }
    const earlyBtn=ms.earlyOut?'':'<button class="btn" style="font-size:11px;padding:4px 10px;flex:none;background:#FEF2F2;border-color:#FECACA;color:var(--red)" onclick="earlyOutMs('+i+',event)">조기퇴실</button>';
    const delBtn='<button class="btn" style="font-size:11px;padding:4px 10px;flex:none" onclick="deleteMsConfirm('+i+',event)">삭제</button>';

function earlyOutMs(i,e){
  e.stopPropagation();
  const arr=loadMs();const ms=arr[i];
  const today=getDate();
  // 오늘 포함 이후 날짜에서 해당 세션ID로 연결된 결제 검색
  const db=loadDb();
  const cancelTargets=[];
  Object.keys(db).forEach(key=>{
    const keyDate=key.split('__')[0];
    if(keyDate<today)return;
    const dayData=db[key];
    if(!dayData||!dayData.rooms)return;
    Object.entries(dayData.rooms).forEach(([rid,sales])=>{
      sales.forEach((s,si)=>{
        if(!s.cancelled&&s.msId===ms.id)cancelTargets.push({key,rid,si});
      });
    });
  });
  const msg=cancelTargets.length>0
    ?cancelTargets.length+'건의 결제가 자동 취소됩니다. 조기퇴실 처리하시겠습니까?'
    :'조기퇴실 처리하시겠습니까?';
  if(!confirm(msg))return;
  // 결제 자동취소
  if(cancelTargets.length>0){
    const now=nowStr();
    cancelTargets.forEach(({key,rid,si})=>{
      db[key].rooms[rid][si].cancelled=true;
      db[key].rooms[rid][si].cancelReason='조기퇴실';
      db[key].rooms[rid][si].cancelledAt=now;
    });
    saveDb(db);
  }
  arr[i].earlyOut=true;saveMs(arr);
  showMultiStay();renderNotifBadge();renderFloors();updateFinalSummary();
}
function deleteMsConfirm(i,e){
  e.stopPropagation();
  if(!confirm('연박 내역을 삭제하시겠습니까?'))return;
  const arr=loadMs();arr.splice(i,1);saveMs(arr);

}

// 오늘 해당 호실에서 선택 가능한 인스턴스
function getMsForRoom(roomId){
  const today=getDate();
  const db=loadDb();const todayKey=today+'__'+currentHotel;const todayData=db[todayKey];
  return loadMs().filter(ms=>{
    if(ms.earlyOut)return false;
    if(ms.hotel&&ms.hotel!==currentHotel)return false;
    const endDate=addDateDays(ms.checkinDate,ms.nights);
    const inRange=today>=ms.checkinDate&&today<endDate;
    if(!inRange)return false;
    // 오늘 이미 입력 완료된 건 제외
    if(todayData&&todayData.rooms){
      for(const rid of Object.keys(todayData.rooms)){
        const found=todayData.rooms[rid].find(s=>s.msId===ms.id&&!s.cancelled);
        if(found)return false;
      }
    }
    // 체크인 첫날은 원래 호실에서만
    if(today===ms.checkinDate)return ms.room===roomId;
    return true;
  });
}

function applyMsInstance(msId){
  if(!msId)return;
  const ms=loadMs().find(m=>m.id===msId);
  if(!ms)return;
  // 첫날 고객정보 검색
  const db=loadDb();
  const firstKey=ms.checkinDate+'__'+currentHotel;
  const firstData=db[firstKey];
  let origSale=null;
  if(firstData&&firstData.rooms){
    const roomSales=firstData.rooms[ms.room]||[];
    origSale=roomSales.find(s=>!s.cancelled&&s.pays&&s.pays.length>0);
    if(!origSale){
      for(const rid of Object.keys(firstData.rooms)){
        const found=firstData.rooms[rid].find(s=>!s.cancelled&&s.pays&&s.pays.length>0);
        if(found){origSale=found;break;}
      }
    }
  }
  if(origSale){
    editSales[0].guest=origSale.guest||'';
    editSales[0].car=origSale.car||'';
    editSales[0].phone=origSale.phone||'';
  }
  editSales[0].msId=msId;
  editSales[0].restay=true;
  editSales[0].multiStay=false;

  renderEditMode();
  setTimeout(()=>{const sel=document.getElementById('ms-instance-sel');if(sel)sel.value=msId;},0);
}

      amt.value=p.amt||'';
      if(p.type==='예약'||p.type==='도도포인트'){amt.disabled=true;amt.style.opacity='.4';amt.value='0';}

      amt.style.cssText='flex:1;font-size:13px;padding:5px 7px;border-radius:6px;border:1px solid #D1D5DB;background:#fff;color:#111';
      amt.addEventListener('input',function(){const raw=this.value.replace(/[^0-9]/g,'');this.value=raw;editSales[si].pays[pi].amt=raw?Number(raw):0;updateEditTotal(si);});
      amt.addEventListener('keydown',function(e){if(['Backspace','Tab','Enter','ArrowLeft','ArrowRight','Delete'].includes(e.key))return;if(e.key>='0'&&e.key<='9')return;e.preventDefault();});
      row.appendChild(sel);row.appendChild(amt);
      if(s.pays.length>1){const del=document.createElement('button');del.className='del-pay';del.textContent='✕';del.addEventListener('click',()=>{editSales[si].pays.splice(pi,1);renderEditMode();});row.appendChild(del);}
      payRows.appendChild(row);

    });
    const addPayBtn=document.createElement('button');addPayBtn.className='add-pay-btn';addPayBtn.textContent='+ 결제수단 추가';
    addPayBtn.addEventListener('click',()=>{editSales[si].pays.push({type:'',amt:''});renderEditMode();});
    paySection.appendChild(payRows);paySection.appendChild(addPayBtn);eb.appendChild(paySection);
    const isEditingRes=s.pays.length===1&&s.pays[0].type==='예약';
    const rest=document.createElement('div');
    if(isEditingRes){
      rest.innerHTML='<div class="fg-row"><div class="fg"><label>예약자명</label><input type="text" value="'+(s.guest||'')+'" oninput="editSales['+si+'].guest=this.value"></div><div class="fg"><label>전화번호</label><input type="text" value="'+(s.phone||'')+'" oninput="editSales['+si+'].phone=this.value"></div></div>';
    } else {
      const nightsOpts=Array.from({length:29},(_,i)=>'<option value="'+(i+2)+'"'+(s.multiStayNights===(i+2)?' selected':'')+'>'+( i+2)+'박</option>').join('');
      const msDisplay=s.multiStay?'display:flex':'display:none';
      rest.innerHTML=
        '<div class="fg-row"><div class="fg"><label>투숙객명</label><input type="text" value="'+(s.guest||'')+'" oninput="editSales['+si+'].guest=this.value"></div><div class="fg"><label>차량번호</label><input type="text" value="'+(s.car||'')+'" oninput="editSales['+si+'].car=this.value"></div></div>'+
        '<div class="fg"><label>전화번호</label><input type="text" value="'+(s.phone||'')+'" oninput="editSales['+si+'].phone=this.value"></div>'+
        '<div class="cb-row" '+(s.msId?'style="display:none"':'')+'>'+
          '<label><input type="checkbox" '+(s.restay?'checked':'')+' onchange="editSales['+si+'].restay=this.checked"> 재숙</label>'+
          '<label><input type="checkbox" '+(s.multiStay?'checked':'')+' onchange="toggleMultiStayCheck('+si+',this.checked)"> 사전결제(연박)</label>'+
        '</div>'+
        '<div id="ms-nights-row-'+si+'" style="'+(s.msId?'display:none':msDisplay)+';gap:9px;align-items:center;margin-bottom:9px">'+
          '<label style="font-size:11px;color:var(--text3);white-space:nowrap">박수</label>'+
          '<select id="ms-nights-'+si+'" onchange="editSales['+si+'].multiStayNights=Number(this.value)" style="font-size:13px;padding:5px 9px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--text)">'+nightsOpts+'</select>'+
        '</div>';
    }
    eb.appendChild(rest);
  });
  const btns=document.createElement('div');btns.className='modal-btns';
  btns.innerHTML='<button class="btn" onclick="getData().rooms[currentRoom]&&getData().rooms[currentRoom].length?switchToView():closeRoomModal()">취소</button><button class="btn btn-save" onclick="saveEditedSales()">저장</button>';
  body.appendChild(btns);
}

function toggleMultiStayCheck(si,checked){
  editSales[si].multiStay=checked;
  const row=document.getElementById('ms-nights-row-'+si);
  if(row)row.style.display=checked?'flex':'none';
}
function updateEditTotal(si){const tot=editSales[si].pays.reduce((a,p)=>a+Number(p.amt||0),0);const el=document.getElementById('et-'+si);if(el)el.textContent='합계: '+fmt(tot)+'원';}
function startEditSale(si){
  if(LOCKED)return;
  const sale=getData().rooms[currentRoom][si];
  editSales=[JSON.parse(JSON.stringify(sale))];
  editSales[0]._editIdx=si;
  if(isReservation(sale))editSales[0].pays=[{type:'',amt:''}];
  modalMode='edit';renderEditMode();
}
function addNewSale(){if(LOCKED)return;editSales=[newSale()];editSales[0]._isNew=true;modalMode='edit';renderEditMode();}
function switchToView(){modalMode='view';renderViewMode();}

function saveEditedSales(){
  if(LOCKED){alert('제출 완료된 보고서는 수정할 수 없습니다.');closeRoomModal();return;}
  const isRes=editSales.length===1&&editSales[0].pays.length===1&&editSales[0].pays[0].type==='예약';
  if(!isRes){
    let hasError=false;
    editSales.forEach((s,si)=>{
      s.pays.forEach((p,pi)=>{
        if(!p.type){hasError=true;const rows=document.querySelectorAll('#eb-'+si+' .pay-row');if(rows[pi]){const sel=rows[pi].querySelector('select');if(sel){sel.style.border='2px solid #EF4444';sel.focus();}}}
        else if(!['장기방','직원숙소','서비스','도도포인트'].includes(p.type)&&Number(p.amt||0)<=0){hasError=true;const rows=document.querySelectorAll('#eb-'+si+' .pay-row');if(rows[pi]){const inp=rows[pi].querySelector('input[type=text]');if(inp){inp.style.border='2px solid #EF4444';inp.focus();}}}
      });
    });
    if(hasError){alert('결제수단과 금액을 확인해주세요.');return;}
  }
  const instSel=document.getElementById('ms-instance-sel');
  const linkedMsId=instSel?instSel.value:'';
  const db2=loadDb();const k2=getKey();if(!db2[k2])ensureData();
  if(!db2[k2].rooms[currentRoom])db2[k2].rooms[currentRoom]=[];
  editSales.forEach(s=>{
    if(!s.savedAt&&!isRes)s.checkin=nowStr();
    s.savedAt=s.savedAt||nowStr();
    if(linkedMsId)s.msId=linkedMsId;
    // 연박 인스턴스 생성
    if(s.multiStay&&!isRes&&!s.msId){
      const nights=s.multiStayNights||2;
      const msId=currentRoom+'호-'+getDate()+'-'+nights+'박-'+currentHotel;
      s.msId=msId;
      const arr=loadMs();
      if(!arr.find(ms=>ms.id===msId)){arr.push({id:msId,room:currentRoom,checkinDate:getDate(),nights,type:'연박',earlyOut:false,hotel:currentHotel});saveMs(arr);}
    }

    if(s._editIdx!==undefined){
      const existing=db2[k2].rooms[currentRoom][s._editIdx];
      if(existing&&existing.checkin&&!isReservation(existing))s.checkin=existing.checkin;
      else if(!isRes)s.checkin=nowStr();
      db2[k2].rooms[currentRoom][s._editIdx]=s;
      delete db2[k2].rooms[currentRoom][s._editIdx]._editIdx;
    } else {
      delete s._isNew;db2[k2].rooms[currentRoom].push(s);
    }
  });
  saveDb(db2);
  modalMode='view';renderViewMode();renderFloors();updateFinalSummary();renderNotesClaims();renderNotifBadge();
}

function openCancelModal(roomId,saleIdx){
  if(LOCKED)return;pendingCancel={roomId,saleIdx};
  const s=getData().rooms[roomId][saleIdx];const tot=s.pays.reduce((a,p)=>a+Number(p.amt||0),0);
  document.getElementById('cancel-info').innerHTML='<b>'+roomId+'호</b> · '+s.pays.map(p=>p.type+(Number(p.amt||0)>0?' '+fmt(p.amt)+'원':'(포인트)')).join(' / ')+' · '+(tot>0?'합계 <b>'+fmt(tot)+'원</b>':'포인트 투숙')+(s.guest?' · '+s.guest:'');
  document.getElementById('cancel-reason').value='';document.getElementById('cancel-modal').classList.add('show');
}
function closeCancelModal(){document.getElementById('cancel-modal').classList.remove('show');}
function confirmCancel(){
  if(LOCKED)return;const reason=document.getElementById('cancel-reason').value.trim();if(!reason){alert('취소 사유를 입력해주세요.');return;}
  const{roomId,saleIdx}=pendingCancel;
  const dbC=loadDb();const kC=getKey();dbC[kC].rooms[roomId][saleIdx].cancelled=true;dbC[kC].rooms[roomId][saleIdx].cancelReason=reason;dbC[kC].rooms[roomId][saleIdx].cancelledAt=nowStr();saveDb(dbC);
  closeCancelModal();renderViewMode();renderFloors();updateFinalSummary();renderNotesClaims();
}
document.getElementById('cancel-modal').addEventListener('click',function(e){if(e.target===this)closeCancelModal();});
function closeRoomModal(){document.getElementById('room-modal').classList.remove('show');}
document.getElementById('room-modal').addEventListener('click',function(e){if(e.target===this)closeRoomModal();});
document.getElementById('ms-modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});

function getExpTotals(){
  let cash=0,card=0;
  (getData().expenses||[]).forEach(e=>{const amt=Number(e.amt||0);if(e.type==='현금')cash+=amt;else if(e.type==='카드')card+=amt;});
  return{cash,card};
}
function updateFinalSummary(){
  const d=getData(),totals={};let grandTotal=0,count=0;
  Object.values(d.rooms).forEach(sales=>{
    sales.forEach(s=>{
      if(s.cancelled||isReservation(s))return;
      s.pays.forEach(p=>{const amt=Number(p.amt||0);if(!amt)return;totals[p.type]=(totals[p.type]||0)+amt;grandTotal+=amt;});
      if(hasSale(s))count++;
    });
  });
  const exp=getExpTotals();const cashBalance=(totals['현금']||0)-exp.cash;
  const rows=[
    {label:'총 매출 <span style="font-size:11px;font-weight:400">('+count+'실)</span>',val:grandTotal,cls:'fs-total',vc:'green'},
    {label:'현금',val:totals['현금']||0,cls:'',vc:'현금'},
    {label:'카드',val:totals['카드']||0,cls:'',vc:'카드'},
    {label:'NOL',val:totals['NOL']||0,cls:'',vc:'NOL'},
    {label:'여기어때',val:totals['여기어때']||0,cls:'',vc:'여기어때'},
    {label:'네이버',val:totals['네이버']||0,cls:'',vc:'네이버'},
    {label:'통장',val:totals['통장']||0,cls:'',vc:'통장'},
    ...(currentHotel==='랜드호텔'?[{label:'도도포인트',val:totals['도도포인트']||0,cls:'',vc:'도도포인트'}]:[]),
    {label:'미수금',val:totals['미수금']||0,cls:'',vc:'미수금'},
    {label:'장기방',val:totals['장기방']||0,cls:'',vc:'장기방'},
    {label:'직원숙소',val:totals['직원숙소']||0,cls:'',vc:'직원숙소'},
    {label:'서비스',val:totals['서비스']||0,cls:'',vc:'서비스'},
    {label:'기타',val:totals['기타']||0,cls:'',vc:'기타'},
    {label:'지출 (현금)',val:exp.cash,cls:'fs-expense',vc:'red'},
    {label:'지출 (카드)',val:exp.card,cls:'fs-expense',vc:'red'},
    {label:'현금잔액',val:cashBalance,cls:'fs-balance',vc:cashBalance>=0?'green':'red'},
  ];
  document.getElementById('final-summary').innerHTML=rows.map(r=>'<div class="fs-row '+r.cls+'"><span class="fs-label">'+r.label+'</span><span class="fs-val '+r.vc+'">'+fmt(r.val)+'원</span></div>').join('');
}
function renderNotesClaims(){
  const d=getData(),rn=[],rc=[];
  Object.entries(d.rooms).forEach(([rid,sales])=>{sales.forEach(s=>{if(s.cancelled)return;if(s.note&&s.note.trim())rn.push({roomId:rid,text:s.note,source:'room'});if(s.claim&&s.claim.trim())rc.push({roomId:rid,text:s.claim,source:'room'});});});
  const an=[...rn,...(d.notes||[]).map(n=>Object.assign({},n,{source:n.source||'extra'}))];
  const ac=[...rc,...(d.claims||[]).map(c=>Object.assign({},c,{source:c.source||'extra'}))];
  document.getElementById('note-count').textContent=an.length+'건';
  document.getElementById('note-items').innerHTML=an.length===0?'<div class="empty-nc">입력된 특이사항이 없습니다</div>':an.map((n,i)=>{const bc=n.source==='room'?'note-badge':'direct-badge';const bt=n.source==='room'?n.roomId+'호':'직접';return '<div class="nc-item"><span class="nc-room-badge '+bc+'">'+bt+'</span><span class="nc-text">'+n.text+'</span>'+(i>=rn.length&&!LOCKED?'<button class="nc-del" onclick="delExtra(\'note\','+i+','+rn.length+')">✕</button>':'')+'</div>';}).join('');
  document.getElementById('claim-count').textContent=ac.length+'건';
  document.getElementById('claim-items').innerHTML=ac.length===0?'<div class="empty-nc">입력된 클레임이 없습니다</div>':ac.map((c,i)=>{const bc=c.source==='room'?'claim-badge':'direct-badge';const bt=c.source==='room'?c.roomId+'호':'직접';return '<div class="nc-item"><span class="nc-room-badge '+bc+'">'+bt+'</span><span class="nc-text">'+c.text+'</span>'+(i>=rc.length&&!LOCKED?'<button class="nc-del" onclick="delExtra(\'claim\','+i+','+rc.length+')">✕</button>':'')+'</div>';}).join('');
}
function addNoteDirectly(){if(LOCKED)return;const roomId=document.getElementById('note-room-sel').value;const text=document.getElementById('note-input').value.trim();if(!text)return;const db=loadDb();const k=getKey();if(!db[k].notes)db[k].notes=[];const src=roomId==='direct'?'extra':'room';db[k].notes.push({roomId:roomId==='direct'?'':roomId,text,source:src});saveDb(db);document.getElementById('note-input').value='';renderNotesClaims();}
function addClaimDirectly(){if(LOCKED)return;const roomId=document.getElementById('claim-room-sel').value;const text=document.getElementById('claim-input').value.trim();if(!text)return;const db=loadDb();const k=getKey();if(!db[k].claims)db[k].claims=[];const src=roomId==='direct'?'extra':'room';db[k].claims.push({roomId:roomId==='direct'?'':roomId,text,source:src});saveDb(db);document.getElementById('claim-input').value='';renderNotesClaims();}
function delExtra(type,allIdx,roomCount){if(LOCKED)return;const db=loadDb();const k=getKey();const ei=allIdx-roomCount;if(type==='note')db[k].notes.splice(ei,1);else db[k].claims.splice(ei,1);saveDb(db);renderNotesClaims();}

async function submitReport(){
  if(LOCKED)return;
  saveCurrentStaff();
  const d=getData();
  const hasUnfinishedRes=Object.values(d.rooms).some(sales=>sales.some(s=>isReservation(s)));
  if(hasUnfinishedRes){alert('완료되지 않은 예약내역이 있습니다. 예약내역 삭제 또는 투숙정보입력을 완료하세요.');return;}
  const count=Object.values(d.rooms).reduce((a,s)=>a+s.filter(x=>hasSale(x)).length,0);
  if(count===0){alert('입력된 판매/예약 내역이 없습니다.');return;}
  if(!confirm(currentHotel+' '+getDate()+' 보고서를 제출하시겠습니까?\n제출 후에는 수정이 불가합니다.'))return;
  const btn=document.getElementById('btn-submit');btn.disabled=true;btn.textContent='전송 중...';
  const roomsWithInfo={};
  Object.entries(d.rooms).forEach(([rid,sales])=>{const info=getRoomInfo(rid);roomsWithInfo[rid]=sales.filter(s=>!isReservation(s)).map(s=>Object.assign({},s,{type:info.type,nosmoking:info.nosmoking,floor:info.floor}));});
  const payload={hotel:currentHotel,date:getDate(),staff:d.staff,rooms:roomsWithInfo,expenses:d.expenses||[],notes:d.notes||[],claims:d.claims||[]};
  try{
    const res=await fetch('https://motel-report.visualium.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const result=await res.json();
    if(result.success){const db=loadDb();const k=getKey();db[k].submitted=true;db[k].submittedAt=nowStr();saveDb(db);loadPage();alert('에어테이블 전송 완료!');}
    else throw new Error(JSON.stringify(result));
  }catch(er){btn.disabled=false;btn.textContent='제출';alert('전송 실패: '+er.message+' 잠시 후 다시 시도해주세요.');}
}
function showHistory(){
  const d=getData(),content=document.getElementById('hist-content');
  const cancelled=[];Object.entries(d.rooms).forEach(([rid,sales])=>sales.forEach(s=>{if(s.cancelled)cancelled.push(Object.assign({rid},s));}));
  content.innerHTML=cancelled.length===0?'<p style="font-size:13px;color:#6B7280;text-align:center;padding:1rem">취소 내역이 없습니다.</p>':cancelled.map(c=>{
    const tot=c.pays.reduce((a,p)=>a+Number(p.amt||0),0);
    const chips=c.pays.map(p=>'<span class="chip chip-'+p.type.replace(/\s/g,'')+'">'+p.type+(Number(p.amt||0)>0?' '+fmt(p.amt):'')+' </span>').join('');
    const priceLabel=tot>0?fmt(tot)+'원':c.pays.some(p=>p.type==='직원숙소')?'직원숙소':c.pays.some(p=>p.type==='장기방')?'장기방':c.pays.some(p=>p.type==='서비스')?'서비스':'포인트 투숙';
    return '<div class="hist-item hist-cancelled"><div class="hist-row"><span><b>'+c.rid+'호</b></span><span class="cancelled-badge">취소</span></div><div class="hist-price">'+priceLabel+'</div><div style="font-size:11px;margin:3px 0">'+chips+'</div><div style="font-size:11px;color:#6B7280">투숙객: '+(c.guest||'-')+(c.car?' | 차번호: '+c.car:'')+' | 취소: '+(c.cancelledAt||'-')+'</div><div style="font-size:11px;color:#991B1B;margin-top:3px">사유: '+(c.cancelReason||'-')+'</div></div>';
  }).join('');
  document.getElementById('hist-modal').classList.add('show');
}
document.getElementById('hist-modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('room-modal').classList.contains('show')&&modalMode==='edit'){
    const tag=document.activeElement.tagName.toLowerCase();
    if(tag==='textarea'||tag==='select')return;
    e.preventDefault();saveEditedSales();
  }
});

function switchHotel(hotel){
  if(!LOCKED){saveCurrentStaff();}
  currentHotel=hotel;
  FLOORS=FLOORS_MAP[hotel];
  PAYS=PAYS_MAP[hotel];
  document.getElementById('tab-land').className='tab-btn'+(hotel==='랜드호텔'?' land-active':'');
  document.getElementById('tab-smart').className='tab-btn'+(hotel==='스마트호텔'?' smart-active':'');
  loadPage();
}
loadPage();
</script>
