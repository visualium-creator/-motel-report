<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;--bg2:#F7F7F5;--bg3:#EFEEEC;
  --border:#E5E4E1;--border2:#D1CFC9;
  --text:#1A1A18;--text2:#4B4A47;--text3:#7C7B77;
  --green:#0F6E56;--green-bg:#EAF3DE;--green-border:#9FE1CB;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --red:#A32D2D;
  --orange:#854F0B;--orange-bg:#FAEEDA;
}
body,html{background:#F3F2EF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;color:var(--text)}
.wrap{padding:.6rem .75rem;margin:0 auto;background:#F3F2EF;max-width:1400px}
.page-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:.6rem}
.header{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;background:var(--bg);padding:9px 12px;border-radius:9px;border:1px solid var(--border)}
.header-label{font-size:12px;font-weight:500;color:var(--text3)}
.ctrl{font-size:13px;padding:5px 8px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--text)}
.locked-banner{display:none;align-items:center;gap:8px;padding:8px 12px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:7px;margin-bottom:.6rem;font-size:12px;color:var(--green);font-weight:500}
.locked-banner.show{display:flex}
.tabs{display:flex;margin-bottom:.6rem;border:1px solid var(--border2);border-radius:7px;overflow:hidden;width:fit-content;background:var(--bg2)}
.tab-btn{padding:6px 20px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text3);border:none}
.tab-btn:not(:last-child){border-right:1px solid var(--border)}
.tab-btn.land-active{background:var(--bg);color:var(--green);border-bottom:2px solid var(--green)}
.tab-btn.smart-active{background:var(--bg);color:var(--blue);border-bottom:2px solid var(--blue)}
.staff-row{display:flex;align-items:center;gap:12px;margin-bottom:.6rem;background:var(--bg);padding:7px 12px;border-radius:7px;border:1px solid var(--border)}
.staff-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3)}
.staff-item input{width:88px;font-size:12px;padding:4px 7px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text)}
.staff-item input:disabled{opacity:.5;cursor:not-allowed;background:var(--bg2)}
.floor-label{font-size:10px;font-weight:600;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.floor-section{margin-bottom:8px}
.rooms-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;width:100%}
.rooms-grid-wide{display:grid;grid-template-columns:repeat(11,1fr);gap:5px;width:100%}
.room-card,.room-card-wide{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;overflow:hidden;min-height:96px;transition:border-color .15s,box-shadow .15s}
.room-card:hover,.room-card-wide:hover{border-color:var(--border2);box-shadow:0 1px 4px rgba(0,0,0,.07)}
.room-card.has-sale,.room-card-wide.has-sale{border-color:#1D9E75}
.room-card.all-cancelled,.room-card-wide.all-cancelled{border-color:var(--red);opacity:.7}
.room-card.nosmoking,.room-card-wide.nosmoking{border-left:3px solid var(--blue)}
.room-header{display:flex;justify-content:space-between;align-items:center;padding:5px 7px 4px;border-bottom:1px solid var(--border);background:var(--bg2)}
.room-num{font-size:13px;font-weight:600;color:var(--text2)}
.room-badges{display:flex;gap:2px;align-items:center;flex-wrap:wrap}
.room-type-badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600}
.type-트윈{background:#DBEAFE;color:#1D4ED8}
.type-더블{background:#DCFCE7;color:#166534}
.type-킹{background:#FEF3C7;color:#92400E}
.type-킹더블{background:#EDE9FE;color:#5B21B6}
.type-스위트{background:#FCE7F3;color:#9D174D}
.type-온돌{background:#FFEDD5;color:#9A3412}
.type-PH{background:#FEE2E2;color:#991B1B}
.type-S{background:#F1F5F9;color:#475569}
.nosmoking-badge{font-size:8px;padding:1px 5px;border-radius:3px;background:#DBEAFE;color:#1D4ED8;font-weight:600}
.sale-slot{padding:4px 7px;border-bottom:1px solid var(--border)}
.sale-slot:last-child{border-bottom:none}
.sale-slot.cancelled{opacity:.5;text-decoration:line-through;background:#FEF2F2}
.sale-price{font-size:15px;font-weight:600;color:var(--text)}
.sale-guest{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sale-car{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:2px;margin-top:4px}
.pay-chips{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.chip{font-size:10px;padding:2px 5px;border-radius:3px;font-weight:600}
.chip-현금{background:#DCFCE7;color:#166534}
.chip-카드{background:#DBEAFE;color:#1D4ED8}
.chip-NOL{background:#FEF3C7;color:#92400E}
.chip-여기어때{background:#FCE7F3;color:#9D174D}
.chip-통장{background:#D1FAE5;color:#065F46}
.chip-도도포인트{background:#FFEDD5;color:#9A3412}
.chip-미수금{background:#FEF3C7;color:#7C2D12}
.chip-기타{background:#F8FAFC;color:#475569}
.chip-취소{background:#FEE2E2;color:#991B1B}
.chip-재숙{background:#EDE9FE;color:#5B21B6}
.empty-room{height:58px}
.section-title{font-size:11px;font-weight:700;color:var(--text3);margin:1rem 0 5px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);padding-bottom:3px}
.exp-wrap{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.exp-header{display:grid;grid-template-columns:2fr 1.2fr 1fr 28px;gap:6px;font-size:10px;font-weight:600;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.exp-row{display:grid;grid-template-columns:2fr 1.2fr 1fr 28px;gap:6px;align-items:center;margin-bottom:5px}
.exp-row input,.exp-row select{font-size:12px;padding:5px 7px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text);width:100%}
.exp-row input:disabled,.exp-row select:disabled{opacity:.5;cursor:not-allowed;background:var(--bg2)}
.add-btn{font-size:12px;padding:5px 12px;border-radius:7px;border:1.5px dashed var(--border2);background:var(--bg2);color:var(--text3);cursor:pointer}
.add-btn:disabled{opacity:.4;cursor:not-allowed}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:0;line-height:1}
.nc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.nc-panel{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.nc-panel-head{font-size:12px;font-weight:600;padding:7px 11px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.nc-panel-head.note-head{background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE}
.nc-panel-head.claim-head{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.nc-input-area{padding:8px 10px;border-bottom:1px solid var(--border);background:var(--bg2)}
.nc-input-area.locked{opacity:.45;pointer-events:none;user-select:none}
.nc-input-row1{display:flex;gap:6px;margin-bottom:5px}
.nc-input-row2{display:flex;gap:6px}
.nc-input-area select,.nc-input-area input{font-size:12px;padding:5px 7px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text)}
.nc-room-sel{flex:1}.nc-text-input{flex:1}
.nc-add-btn{font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer}
.nc-items{padding:6px 10px;min-height:48px}
.nc-item{display:flex;gap:8px;align-items:flex-start;padding:5px 4px;border-bottom:1px solid var(--border);font-size:12px}
.nc-item:last-child{border-bottom:none}
.nc-room-badge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.nc-room-badge.note-badge{background:#DBEAFE;color:#1D4ED8}
.nc-room-badge.claim-badge{background:#FEE2E2;color:#991B1B}
.nc-room-badge.direct-badge{background:#F1F5F9;color:#475569}
.nc-text{flex:1;color:var(--text);line-height:1.5}
.nc-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0 2px}
.empty-nc{font-size:11px;color:var(--text3);padding:10px 4px;text-align:center}
.final-summary{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:.5rem}
.fs-row{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-bottom:1px solid var(--border);font-size:13px}
.fs-row:last-child{border-bottom:none}
.fs-row.fs-total{background:var(--bg2);font-weight:600}
.fs-row.fs-expense{background:#FEF2F2}
.fs-row.fs-balance{background:var(--green-bg);font-weight:600}
.fs-label{color:var(--text3);font-size:12px}
.fs-val{font-weight:600;color:var(--text);font-size:13px}
.fs-val.green{color:var(--green)}.fs-val.red{color:var(--red)}.fs-val.blue{color:var(--blue)}
.submit-area{margin-top:1.25rem;padding:1.1rem 1.25rem;background:var(--bg);border:1px solid var(--border);border-radius:9px}
.submit-area-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.submit-title{font-size:13px;font-weight:600;color:var(--text)}
.submit-status{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.status-pending{background:var(--orange-bg);color:var(--orange)}
.status-sent{background:var(--green-bg);color:var(--green)}
.status-future{background:var(--blue-bg);color:var(--blue)}
.submit-info{font-size:12px;color:var(--text3);margin-bottom:.75rem;line-height:1.6}
.btn-submit{width:100%;padding:10px;font-size:14px;font-weight:600;border-radius:8px;border:none;cursor:pointer;background:#1D9E75;color:#fff}
.btn-submit:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed}
.btn-submit.sent{background:var(--blue)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg);border-radius:12px;border:1px solid var(--border);padding:1.4rem;width:400px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem}
.modal-head h2{font-size:15px;font-weight:600;color:var(--text)}
.close-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);padding:2px 6px;border-radius:5px}
.sale-card{border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.sale-card.cancelled-card{border-color:var(--red)}
.sale-card-head{display:flex;justify-content:space-between;align-items:center;padding:6px 11px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2)}
.sale-card-head.cancelled-head{background:#FEF2F2;color:var(--red)}
.sale-card-head.saved-head{background:#F0FDF4;color:#166534}
.sale-card-body{padding:9px 11px}
.saved-view{font-size:12px}
.saved-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);color:var(--text3)}
.saved-row:last-child{border-bottom:none}
.saved-row span:last-child{color:var(--text);font-weight:500}
.saved-actions{display:flex;gap:7px;margin-top:9px}
.fg{margin-bottom:9px}
.fg label{font-size:11px;color:var(--text3);display:block;margin-bottom:3px;font-weight:500}
.fg label .req{color:var(--red);margin-left:2px}
.fg input,.fg select,.fg textarea{width:100%;font-size:13px;padding:5px 9px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--text)}
.fg textarea{resize:vertical;min-height:44px;font-size:12px}
.fg-row{display:flex;gap:9px}.fg-row .fg{flex:1}
.pay-rows{margin-bottom:7px}
.pay-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.pay-row select{flex:1.3;font-size:12px;padding:5px 7px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text)}
.pay-row input[type=text]{flex:1;font-size:13px;padding:5px 7px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text)}
.del-pay{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:0 2px;flex-shrink:0}
.add-pay-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:1px dashed var(--border2);background:var(--bg2);color:var(--text3);cursor:pointer;margin-bottom:7px}
.cb-row{display:flex;gap:14px;margin-bottom:9px}
.cb-row label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer}
.modal-btns{display:flex;gap:7px;margin-top:.9rem}
.btn{flex:1;padding:7px;font-size:13px;border-radius:7px;border:1px solid var(--border2);cursor:pointer;background:var(--bg);color:var(--text);font-weight:500}
.btn-save{background:#1D9E75;border-color:#1D9E75;color:#fff}
.btn-cancel-sale{background:#FEF2F2;border-color:#FECACA;color:var(--red)}
.btn-edit{background:#EFF6FF;border-color:#BFDBFE;color:var(--blue)}
.btn-add-sale{background:var(--bg2);border-color:var(--border2);color:var(--text2)}
.cancelled-badge{font-size:10px;background:#FEE2E2;color:var(--red);padding:2px 7px;border-radius:4px;font-weight:600}
.cancel-confirm{background:var(--bg);border-radius:11px;border:1.5px solid #FECACA;padding:1.4rem;width:330px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.cancel-confirm h2{font-size:14px;font-weight:600;color:var(--red);margin-bottom:.7rem}
.hist-item{border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:7px;font-size:12px}
.hist-item.hist-cancelled{border-color:#FECACA;background:#FEF2F2}
.hist-row{display:flex;justify-content:space-between;color:var(--text3);margin-bottom:2px}
.hist-price{font-size:14px;font-weight:600;color:var(--red);text-decoration:line-through}
</style>

<div class="wrap">
  <div class="page-title">랜드+스마트 일일보고서</div>
  <div class="header">
    <span class="header-label">일일 보고서</span>
    <input type="date" class="ctrl" id="date-sel">
    <button class="btn" style="flex:none;padding:5px 11px;font-size:12px" onclick="showHistory()">결제취소 내역</button>
  </div>
  <div class="locked-banner" id="locked-banner">🔒 <span id="locked-msg">제출 완료된 보고서입니다. 조회만 가능합니다.</span></div>
  <div class="tabs">
    <button class="tab-btn land-active" id="tab-land" onclick="switchTab('랜드호텔')">랜드호텔</button>
    <button class="tab-btn" id="tab-smart" onclick="switchTab('스마트호텔')">스마트호텔</button>
  </div>
  <div class="staff-row">
    <div class="staff-item"><span>오전</span><input type="text" id="s-am" placeholder="담당자"></div>
    <div class="staff-item"><span>주간</span><input type="text" id="s-day" placeholder="담당자"></div>
    <div class="staff-item"><span>야간</span><input type="text" id="s-night" placeholder="담당자"></div>
  </div>
  <div id="floors"></div>
  <div class="section-title">지출내역</div>
  <div class="exp-wrap">
    <div class="exp-header"><div>항목</div><div>금액</div><div>형태</div><div></div></div>
    <div id="expenses"></div>
    <button class="add-btn" id="add-exp-btn" onclick="addExpense()" style="margin-top:2px">+ 지출 추가</button>
  </div>
  <div class="section-title">특이사항 & 클레임</div>
  <div class="nc-grid">
    <div class="nc-panel">
      <div class="nc-panel-head note-head"><span>특이사항</span><span id="note-count" style="font-size:10px;font-weight:500">0건</span></div>
      <div class="nc-input-area" id="note-input-area">
        <div class="nc-input-row1"><select class="nc-room-sel" id="note-room-sel"><option value="direct">직접입력</option></select></div>
        <div class="nc-input-row2"><input class="nc-text-input" type="text" id="note-input" placeholder="특이사항 내용 입력"><button class="nc-add-btn" onclick="addNoteDirectly()">추가</button></div>
      </div>
      <div class="nc-items" id="note-items"><div class="empty-nc">입력된 특이사항이 없습니다</div></div>
    </div>
    <div class="nc-panel">
      <div class="nc-panel-head claim-head"><span>객실 클레임</span><span id="claim-count" style="font-size:10px;font-weight:500">0건</span></div>
      <div class="nc-input-area" id="claim-input-area">
        <div class="nc-input-row1"><select class="nc-room-sel" id="claim-room-sel"><option value="direct">직접입력</option></select></div>
        <div class="nc-input-row2"><input class="nc-text-input" type="text" id="claim-input" placeholder="클레임 내용 입력"><button class="nc-add-btn" onclick="addClaimDirectly()">추가</button></div>
      </div>
      <div class="nc-items" id="claim-items"><div class="empty-nc">입력된 클레임이 없습니다</div></div>
    </div>
  </div>
  <div class="section-title">일일 정산</div>
  <div class="final-summary" id="final-summary"></div>
  <div class="submit-area">
    <div class="submit-area-head">
      <span class="submit-title" id="submit-title">보고서 제출</span>
      <span class="submit-status status-pending" id="submit-status">미제출</span>
    </div>
    <div class="submit-info" id="submit-info">당일 보고서 작성이 완료되면 제출 버튼을 눌러주세요.<br>제출 후에는 수정이 불가합니다.</div>
    <button class="btn-submit" id="btn-submit" onclick="submitReport()">제출</button>
  </div>
</div>

<div class="modal-bg" id="room-modal">
  <div class="modal">
    <div class="modal-head"><h2 id="modal-title">객실</h2><button class="close-btn" onclick="closeRoomModal()">✕</button></div>
    <div id="modal-body"></div>
  </div>
</div>
<div class="modal-bg" id="cancel-modal">
  <div class="cancel-confirm">
    <h2>결제취소 확인</h2>
    <div style="font-size:12px;color:#6B7280;margin-bottom:11px" id="cancel-info"></div>

      <label>취소 사유 <span class="req">*필수</span></label>

    </div>
    <div style="display:flex;gap:8px;margin-top:11px">
      <button class="btn" style="flex:1" onclick="closeCancelModal()">닫기</button>
      <button class="btn btn-cancel-sale" style="flex:1" onclick="confirmCancel()">결제취소 확정</button>
    </div>
  </div>
</div>
<div class="modal-bg" id="hist-modal">
  <div class="modal">
    <div class="modal-head"><h2>결제취소 내역</h2><button class="close-btn" onclick="document.getElementById('hist-modal').classList.remove('show')">✕</button></div>
    <div id="hist-content"></div>
  </div>
</div>

<script>
function buildRooms(hotel){
  const R={};
  if(hotel==='스마트호텔'){
    ['P101','P102','P103'].forEach(r=>R[r]={type:'트윈',nosmoking:false,floor:'11층'});
    R['P105']={type:'킹',nosmoking:false,floor:'11층'};
    ['P106','P107'].forEach(r=>R[r]={type:'더블',nosmoking:false,floor:'11층'});
    R['102']={type:'스위트',nosmoking:false,floor:'11층'};
    ['1001','1002','1003'].forEach(r=>R[r]={type:'트윈',nosmoking:false,floor:'10층'});
    R['1005']={type:'킹',nosmoking:false,floor:'10층'};
    ['1006','1007'].forEach(r=>R[r]={type:'더블',nosmoking:false,floor:'10층'});
    R['103']={type:'스위트',nosmoking:false,floor:'10층'};
    [9,8,7].forEach(fl=>{

    rest.innerHTML=`
      <div class="fg-row">
        <div class="fg"><label>투숙객명</label><input type="text" value="${s.guest||''}" placeholder="성명" oninput="editSales[${si}].guest=this.value"></div>
        <div class="fg"><label>차량번호</label><input type="text" value="${s.car||''}" placeholder="12가 3456" oninput="editSales[${si}].car=this.value"></div>
      </div>
      <div class="fg"><label>체크인 시간</label><input type="time" value="${s.checkin||'11:00'}" oninput="editSales[${si}].checkin=this.value"></div>
      <div class="cb-row"><label><input type="checkbox" ${s.restay?'checked':''} onchange="editSales[${si}].restay=this.checked"> 재숙</label></div>
      <div class="fg"><label>클레임</label><textarea placeholder="클레임 내용" oninput="editSales[${si}].claim=this.value">${s.claim||''}</textarea></div>
      <div class="fg"><label>특이사항</label><textarea placeholder="특이사항" oninput="editSales[${si}].note=this.value">${s.note||''}</textarea></div>`;
    eb.appendChild(rest);
  });
  const btns=document.createElement('div');btns.className='modal-btns';
  btns.innerHTML=`<button class="btn" onclick="getData().rooms[currentRoom]?.length?switchToView():closeRoomModal()">취소</button><button class="btn btn-save" onclick="saveEditedSales()">저장</button>`;
  body.appendChild(btns);
}
function updateEditTotal(si){const tot=editSales[si].pays.reduce((a,p)=>a+Number(p.amt||0),0);const el=document.getElementById('et-'+si);if(el)el.textContent=`합계: ${fmt(tot)}원`;}
function startEditSale(si){if(LOCKED)return;editSales=[JSON.parse(JSON.stringify(getData().rooms[currentRoom][si]))];editSales[0]._editIdx=si;modalMode='edit';renderEditMode();}
function addNewSale(){if(LOCKED)return;editSales=[newSale()];editSales[0]._isNew=true;modalMode='edit';renderEditMode();}
function switchToView(){modalMode='view';renderViewMode();}
function saveEditedSales(){
  if(LOCKED){alert('제출 완료된 보고서는 수정할 수 없습니다.');closeRoomModal();return;}
  let hasError=false;
  editSales.forEach((s,si)=>{
    s.pays.forEach((p,pi)=>{
      if(!p.type){hasError=true;const rows=document.querySelectorAll(`#eb-${si} .pay-row`);if(rows[pi]){const sel=rows[pi].querySelector('select');if(sel){sel.style.border='2px solid #EF4444';sel.focus();}}}
      else if(p.type!=='도도포인트'&&Number(p.amt||0)<=0){hasError=true;const rows=document.querySelectorAll(`#eb-${si} .pay-row`);if(rows[pi]){const inp=rows[pi].querySelector('input[type=text]');if(inp){inp.style.border='2px solid #EF4444';inp.focus();}}}
    });
  });
  if(hasError){alert('결제수단과 금액을 확인해주세요. (도도포인트는 금액 없이 가능)');return;}
  const db2=loadDb();const k2=getKey();if(!db2[k2])db2[k2]={rooms:{},expenses:[],notes:[],claims:[],staff:{am:'',day:'',night:''},submitted:false,submittedAt:''};
  if(!db2[k2].rooms[currentRoom])db2[k2].rooms[currentRoom]=[];
  editSales.forEach(s=>{s.savedAt=nowStr();if(s._editIdx!==undefined){db2[k2].rooms[currentRoom][s._editIdx]=s;delete db2[k2].rooms[currentRoom][s._editIdx]._editIdx;}else{delete s._isNew;db2[k2].rooms[currentRoom].push(s);}});
  saveDb(db2);
  modalMode='view';renderViewMode();renderFloors();updateFinalSummary();renderNotesClaims();
}
function openCancelModal(roomId,saleIdx){
  if(LOCKED)return;pendingCancel={roomId,saleIdx};
  const s=getData().rooms[roomId][saleIdx];const tot=s.pays.reduce((a,p)=>a+Number(p.amt||0),0);
  document.getElementById('cancel-info').innerHTML=`<b>${roomId}호</b> · ${s.pays.map(p=>`${p.type}${Number(p.amt||0)>0?' '+fmt(p.amt)+'원':'(포인트)'}`).join(' / ')} · ${tot>0?'합계 <b>'+fmt(tot)+'원</b>':'포인트 투숙'}${s.guest?' · '+s.guest:''}`;
  document.getElementById('cancel-reason').value='';document.getElementById('cancel-modal').classList.add('show');
}
function closeCancelModal(){document.getElementById('cancel-modal').classList.remove('show');}
function confirmCancel(){
  if(LOCKED)return;const reason=document.getElementById('cancel-reason').value.trim();if(!reason){alert('취소 사유를 입력해주세요.');return;}
  const{roomId,saleIdx}=pendingCancel;const s=getData().rooms[roomId][saleIdx];
  const dbC=loadDb();const kC=getKey();
  dbC[kC].rooms[roomId][saleIdx].cancelled=true;dbC[kC].rooms[roomId][saleIdx].cancelReason=reason;dbC[kC].rooms[roomId][saleIdx].cancelledAt=nowStr();
  saveDb(dbC);
  closeCancelModal();renderViewMode();renderFloors();updateFinalSummary();renderNotesClaims();
}
document.getElementById('cancel-modal').addEventListener('click',function(e){if(e.target===this)closeCancelModal();});
function closeRoomModal(){document.getElementById('room-modal').classList.remove('show');}
document.getElementById('room-modal').addEventListener('click',function(e){if(e.target===this)closeRoomModal();});
function getExpTotals(){
  let cash=0,card=0;
  document.querySelectorAll('#expenses .exp-row').forEach(row=>{const amt=Number(row.querySelector('.exp-amt')?.value||0);const type=row.querySelector('.exp-type')?.value||'';if(type==='현금')cash+=amt;else if(type==='카드')card+=amt;});
  return{cash,card};
}
function updateFinalSummary(){
  const pays=PAYS[currentHotel],d=getData(),totals={};let grandTotal=0,count=0;
  Object.values(d.rooms).forEach(sales=>{
    sales.forEach(s=>{
      if(s.cancelled)return;
      s.pays.forEach(p=>{const amt=Number(p.amt||0);if(!amt)return;totals[p.type]=(totals[p.type]||0)+amt;grandTotal+=amt;});
      if(hasSale(s))count++;
    });
  });
  const exp=getExpTotals();const cashBalance=(totals['현금']||0)-exp.cash;
  const etcPays=pays.filter(p=>!['현금','카드','NOL','여기어때','통장','미수금','도도포인트'].includes(p));
  const etcTotal=etcPays.reduce((a,p)=>a+(totals[p]||0),0);
  const rows=[
    {label:`총 매출 <span style="font-size:11px;font-weight:400">(${count}실)</span>`,val:grandTotal,cls:'fs-total',vc:'green'},
    {label:'현금',val:totals['현금']||0,cls:'',vc:''},{label:'카드',val:totals['카드']||0,cls:'',vc:'blue'},
    {label:'NOL',val:totals['NOL']||0,cls:'',vc:''},{label:'여기어때',val:totals['여기어때']||0,cls:'',vc:''},
    {label:'통장',val:totals['통장']||0,cls:'',vc:''},
    ...(currentHotel==='랜드호텔'?[{label:'도도포인트',val:totals['도도포인트']||0,cls:'',vc:''}]:[]),
    {label:'미수금',val:totals['미수금']||0,cls:'',vc:'red'},
    {label:'기타',val:etcTotal,cls:'',vc:''},
    {label:'지출 (현금)',val:exp.cash,cls:'fs-expense',vc:'red'},{label:'지출 (카드)',val:exp.card,cls:'fs-expense',vc:'red'},
    {label:'현금잔액',val:cashBalance,cls:'fs-balance',vc:cashBalance>=0?'green':'red'},
  ];
  document.getElementById('final-summary').innerHTML=rows.map(r=>`<div class="fs-row ${r.cls}"><span class="fs-label">${r.label}</span><span class="fs-val ${r.vc}">${fmt(r.val)}원</span></div>`).join('');
}
function renderNotesClaims(){
  const d=getData(),rn=[],rc=[];
  Object.entries(d.rooms).forEach(([rid,sales])=>{sales.forEach(s=>{if(s.cancelled)return;if(s.note?.trim())rn.push({roomId:rid,text:s.note,source:'room'});if(s.claim?.trim())rc.push({roomId:rid,text:s.claim,source:'room'});});});
  const an=[...rn,...(d.notes||[]).map(n=>({...n,source:'extra'}))];
  const ac=[...rc,...(d.claims||[]).map(c=>({...c,source:'extra'}))];
  document.getElementById('note-count').textContent=an.length+'건';
  document.getElementById('note-items').innerHTML=an.length===0?'<div class="empty-nc">입력된 특이사항이 없습니다</div>'
    :an.map((n,i)=>{const bc=n.source==='room'?'note-badge':'direct-badge';const bt=n.source==='room'?n.roomId+'호':'직접';return `<div class="nc-item"><span class="nc-room-badge ${bc}">${bt}</span><span class="nc-text">${n.text}</span>${n.source==='extra'&&!LOCKED?`<button class="nc-del" onclick="delExtra('note',${i},${rn.length})">✕</button>`:''}</div>`;}).join('');
  document.getElementById('claim-count').textContent=ac.length+'건';
  document.getElementById('claim-items').innerHTML=ac.length===0?'<div class="empty-nc">입력된 클레임이 없습니다</div>'
    :ac.map((c,i)=>{const bc=c.source==='room'?'claim-badge':'direct-badge';const bt=c.source==='room'?c.roomId+'호':'직접';return `<div class="nc-item"><span class="nc-room-badge ${bc}">${bt}</span><span class="nc-text">${c.text}</span>${c.source==='extra'&&!LOCKED?`<button class="nc-del" onclick="delExtra('claim',${i},${rc.length})">✕</button>`:''}</div>`;}).join('');
}
function addNoteDirectly(){if(LOCKED)return;const roomId=document.getElementById('note-room-sel').value;const text=document.getElementById('note-input').value.trim();if(!text)return;const dbN=loadDb();const kN=getKey();if(!dbN[kN].notes)dbN[kN].notes=[];dbN[kN].notes.push({roomId:roomId==='direct'?'':roomId,text});saveDb(dbN);document.getElementById('note-input').value='';renderNotesClaims();}
function addClaimDirectly(){if(LOCKED)return;const roomId=document.getElementById('claim-room-sel').value;const text=document.getElementById('claim-input').value.trim();if(!text)return;const dbCl=loadDb();const kCl=getKey();if(!dbCl[kCl].claims)dbCl[kCl].claims=[];dbCl[kCl].claims.push({roomId:roomId==='direct'?'':roomId,text});saveDb(dbCl);document.getElementById('claim-input').value='';renderNotesClaims();}
function delExtra(type,allIdx,roomCount){if(LOCKED)return;const dbD=loadDb();const kD=getKey();const ei=allIdx-roomCount;if(type==='note')dbD[kD].notes.splice(ei,1);else dbD[kD].claims.splice(ei,1);saveDb(dbD);renderNotesClaims();}
async function submitReport(){
  if(LOCKED)return;
  saveCurrentExpenses();saveCurrentStaff();
  const d=getData();
  const count=Object.values(d.rooms).reduce((a,s)=>a+s.filter(x=>hasSale(x)).length,0);
  if(count===0){alert('입력된 판매/예약 내역이 없습니다.');return;}
  if(isFutureDate()){alert(`${getDate()} 예약 데이터가 저장되었습니다.\n실제 제출은 해당 날짜에 진행하세요.`);return;}
  if(!confirm(`${currentHotel} ${getDate()} 보고서를 제출하시겠습니까?\n제출 후에는 수정이 불가합니다.`))return;

  // 전송 버튼 비활성화
  const btn=document.getElementById('btn-submit');
  btn.disabled=true;btn.textContent='전송 중...';

  // 객실 데이터에 타입/금연 정보 추가
  const roomsWithInfo={};
  Object.entries(d.rooms).forEach(([rid,sales])=>{
    const info=getRoomInfo(rid);
    roomsWithInfo[rid]=sales.map(s=>({...s,type:info.type,nosmoking:info.nosmoking,floor:info.floor}));
  });

  const payload={
    hotel:currentHotel,
    date:getDate(),
    staff:d.staff,
    rooms:roomsWithInfo,
    expenses:d.expenses||[],
  };

  try{
    const res=await fetch('https://motel-report.visualium.workers.dev',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
    });
    const result=await res.json();
    if(result.success){
      const dbS=loadDb();const kS=getKey();dbS[kS].submitted=true;dbS[kS].submittedAt=nowStr();saveDb(dbS);loadPage();
      alert('✅ 에어테이블 전송 완료!');
    } else {
      throw new Error(JSON.stringify(result));
    }
  } catch(err){
    btn.disabled=false;btn.textContent='제출';
    alert('❌ 전송 실패: '+err.message+'\n\n잠시 후 다시 시도해주세요.');
  }
}
function showHistory(){
  const d=getData(),content=document.getElementById('hist-content');
  const cancelled=[];Object.entries(d.rooms).forEach(([rid,sales])=>sales.forEach(s=>{if(s.cancelled)cancelled.push({rid,...s});}));
  content.innerHTML=cancelled.length===0?'<p style="font-size:13px;color:#6B7280;text-align:center;padding:1rem">취소 내역이 없습니다.</p>'
    :cancelled.map(c=>{const tot=c.pays.reduce((a,p)=>a+Number(p.amt||0),0);const chips=c.pays.map(p=>`<span class="chip chip-${p.type.replace(/\s/g,'')}">${p.type}${Number(p.amt||0)>0?' '+fmt(p.amt):''}</span>`).join(' ');
      return `<div class="hist-item hist-cancelled"><div class="hist-row"><span><b>${c.rid}호</b></span><span class="cancelled-badge">취소</span></div>
        <div class="hist-price">${tot>0?fmt(tot)+'원':'포인트 투숙'}</div><div style="font-size:11px;margin:3px 0">${chips}</div>
        <div style="font-size:11px;color:#6B7280">투숙객: ${c.guest||'-'}${c.car?' | 차번호: '+c.car:''} | 취소: ${c.cancelledAt||'-'}</div>
        <div style="font-size:11px;color:#991B1B;margin-top:3px">사유: ${c.cancelReason||'-'}</div></div>`;}).join('');
  document.getElementById('hist-modal').classList.add('show');
}
document.getElementById('hist-modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
loadPage();
</script>
